name: Update Public Domain Movies
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install axios
      - run: node scripts/fetch-public-domain.js
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Public Domain Movies"
